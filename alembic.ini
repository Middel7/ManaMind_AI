# Configuration Alembic — ManaMind AI
# Doc : https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Dossier contenant env.py et les migrations
script_location = alembic

# Format du nom des fichiers de migration : timestamp_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# L'URL est chargée dynamiquement depuis .env dans alembic/env.py
# Ne pas mettre sqlalchemy.url ici pour éviter de commettre des credentials

# Encodage de la sortie des scripts de migration
output_encoding = utf-8

[post_write_hooks]
# Hook Ruff désactivé (nécessite ruff.executable en chemin absolu sur Windows)
# Pour réactiver : hooks = ruff et ajouter ruff.executable = chemin/vers/ruff.exe

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
