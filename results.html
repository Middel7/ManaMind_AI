<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recommandations — ManaMind</title>
  <style>
    :root {
      color-scheme: dark;
      color: #f8fafc;
      background: #020617;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(2, 6, 23, 0.88), rgba(2, 6, 23, 0.88)),
        url('chandra-jace-and-nissa-from-magic-the-gathering.avif');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      padding: 24px;
    }

    .page {
      max-width: 1680px;
      width: min(96vw, 1680px);
      margin: 0 auto;
      display: grid;
      gap: 24px;
    }

    /* ── Navigation ─────────────────────────────────────────────── */
    .site-nav {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px 24px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 20px;
    }

    .site-nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 10px;
      transition: background 0.15s, color 0.15s;
    }

    .site-nav a:hover { background: rgba(148, 163, 184, 0.08); color: #f8fafc; }
    .site-nav a.active { color: #38bdf8; background: rgba(56, 189, 248, 0.08); }
    .site-nav .sep { color: rgba(148, 163, 184, 0.3); user-select: none; }

    /* ── En-tête commandant ─────────────────────────────────────── */
    .commander-header {
      padding: 32px;
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.35);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 0.4s ease;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .commander-label {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 6px;
    }

    .commander-name {
      font-size: clamp(1.4rem, 2.5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #f8fafc;
    }

    .status-note {
      margin-left: auto;
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.6;
      text-align: right;
    }

    /* ── Grille résultats ───────────────────────────────────────── */
    .grid-results {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    @media (max-width: 900px) {
      .grid-results { grid-template-columns: 1fr; }
    }

    .result-card {
      border-radius: 24px;
      background: rgba(8, 16, 35, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.12);
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .result-card h3 {
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .result-card h3.add-title { color: #86efac; }
    .result-card h3.remove-title { color: #fca5a5; }

    .result-card span {
      color: #94a3b8;
      font-size: 0.92rem;
    }

    /* ── Liste de cartes ────────────────────────────────────────── */
    .card-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .item {
      display: grid;
      justify-items: center;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.08);
      transition: border-color 0.2s;
    }

    .item:hover { border-color: rgba(56, 189, 248, 0.2); }

    .thumb {
      width: 200px;
      aspect-ratio: 0.7;
      border-radius: 18px;
      overflow: hidden;
      background: #0f172a;
      display: grid;
      place-items: center;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .item-title {
      color: #f8fafc;
      font-size: 0.96rem;
      line-height: 1.3;
      text-align: center;
      max-width: 220px;
      word-break: break-word;
      font-weight: 500;
    }

    .item-price {
      color: #a5f3fc;
      font-size: 0.88rem;
      text-align: center;
    }

    .item-link {
      color: #7dd3fc;
      font-size: 0.88rem;
      text-decoration: none;
      text-align: center;
    }

    .item-link:hover { text-decoration: underline; }

    /* ── État chargement / erreur ───────────────────────────────── */
    .loading-state {
      text-align: center;
      padding: 60px 24px;
      color: #64748b;
      font-size: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      text-align: center;
      padding: 60px 24px;
      color: #f87171;
    }

    /* ── Footer note ────────────────────────────────────────────── */
    .footer-note {
      color: #64748b;
      font-size: 0.88rem;
      text-align: center;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Navigation -->
    <nav class="site-nav">
      <a href="/">← Analyser un nouveau deck</a>
      <span class="sep">|</span>
      <a href="/cards">Recherche de cartes</a>
      <span class="sep">|</span>
      <a href="/results" class="active">Recommandations</a>
    </nav>

    <!-- En-tête commandant (rempli dynamiquement) -->
    <header class="commander-header" id="commanderHeader">
      <div>
        <span class="commander-label">Commandant</span>
        <span class="commander-name" id="commanderName">Chargement…</span>
      </div>
      <div class="status-note" id="statusNote"></div>
    </header>

    <!-- Zone de chargement initiale -->
    <div id="loadingZone" class="loading-state">
      <div class="spinner"></div>
      Chargement des recommandations…
    </div>

    <!-- Résultats (masqués jusqu'au chargement) -->
    <div id="resultsZone" style="display:none; display:none;">
      <div class="grid-results">
        <div class="result-card">
          <div>
            <h3 class="add-title">Cartes à ajouter</h3>
            <span id="addCount">0 cartes</span>
          </div>
          <div id="addList" class="card-list"></div>
        </div>
        <div class="result-card">
          <div>
            <h3 class="remove-title">Cartes à retirer</h3>
            <span id="removeCount">0 cartes</span>
          </div>
          <div id="removeList" class="card-list"></div>
        </div>
      </div>
      <div class="footer-note" id="footerNote"></div>
    </div>

  </div>

  <script>
    'use strict';

    // ── Éléments DOM ──────────────────────────────────────────────────────────
    const commanderNameEl  = document.getElementById('commanderName');
    const commanderHeader  = document.getElementById('commanderHeader');
    const statusNote       = document.getElementById('statusNote');
    const loadingZone      = document.getElementById('loadingZone');
    const resultsZone      = document.getElementById('resultsZone');
    const addList          = document.getElementById('addList');
    const removeList       = document.getElementById('removeList');
    const addCount         = document.getElementById('addCount');
    const removeCount      = document.getElementById('removeCount');
    const footerNote       = document.getElementById('footerNote');

    // ── Lecture du paramètre ?csv= dans l'URL ─────────────────────────────────
    const csvPath = new URLSearchParams(window.location.search).get('csv');
    if (!csvPath) {
      showError('Aucun fichier de recommandations spécifié. <a href="/">Retourner à l\'accueil</a>');
    } else {
      loadResults(csvPath);
    }

    // ── Chargement principal ──────────────────────────────────────────────────
    async function loadResults(path) {
      try {
        const resp = await fetch(path);
        if (!resp.ok) throw new Error(`Fichier introuvable : ${path}`);
        const csv = await resp.text();
        const { commander, add, remove } = parseCsv(csv);

        // Affiche le commandant
        commanderNameEl.textContent = commander !== 'inconnu' ? commander : 'Commandant inconnu';
        document.title = `${commanderNameEl.textContent} — Recommandations`;

        // Compte
        addCount.textContent    = `${add.length} carte${add.length > 1 ? 's' : ''}`;
        removeCount.textContent = `${remove.length} carte${remove.length > 1 ? 's' : ''}`;

        // Affiche la zone résultats
        loadingZone.style.display = 'none';
        resultsZone.style.display = 'block';

        // Charge les visuels en parallèle
        statusNote.textContent = 'Chargement des images Scryfall…';
        footerNote.textContent = 'Chargement des images…';

        await Promise.all([
          renderCards(add, addList),
          renderCards(remove, removeList),
        ]);

        footerNote.textContent = `Fichier : ${path}`;
        statusNote.textContent = `${add.length} ajouts · ${remove.length} retraits`;

        // Art du commandant en fond
        if (commander !== 'inconnu') {
          const artUrl = await fetchCommanderArt(commander);
          if (artUrl) {
            commanderHeader.style.backgroundImage =
              `linear-gradient(rgba(2, 6, 23, 0.72), rgba(2, 6, 23, 0.72)), url('${artUrl}')`;
          }
        }

      } catch (err) {
        showError(`Erreur : ${err.message}`);
      }
    }

    // ── Parseur CSV ───────────────────────────────────────────────────────────
    // Utilise la même regex que la page originale qui fonctionnait :
    // "([^"]*)" gère les champs entre guillemets (ex: "Eluge, the Shoreless Sea")
    // ([^,]+)   gère les champs sans guillemets non vides
    function parseRow(line) {
      return line.match(/(?:"([^"]*)"|([^,]+))/g)
        ?.map(cell => cell.replace(/^"|"$/g, '').trim()) || [];
    }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      const header = parseRow(lines[0]).map(c => c.toLowerCase());

      const sectionIdx = header.indexOf('section');
      const cardIdx    = header.indexOf('card name');
      const scoreIdx   = header.indexOf('score');
      const supportIdx = header.indexOf('support');

      const add = [], remove = [];
      let commander = 'inconnu';

      for (let i = 1; i < lines.length; i++) {
        const row = parseRow(lines[i]);

        const section  = (row[sectionIdx] || '').toLowerCase();
        const cardName = row[cardIdx] || '';
        if (!cardName) continue;

        if (section === 'commander') { commander = cardName; continue; }

        if (section === 'add' || section === 'remove') {
          const entry = {
            cardName,
            score:       scoreIdx   >= 0 ? row[scoreIdx]   || '' : '',
            support:     supportIdx >= 0 ? row[supportIdx]  || '' : '',
            marketLink:  'https://www.cardmarket.com/en/Magic/Products/Search?category=-1&searchString=' + encodeURIComponent(cardName).replace(/%20/g, '+') + '&searchMode=v2',
            marketLabel: section === 'add' ? 'Voir chez Relic sur Cardmarket' : 'Vendre à RELIC',
          };
          if (section === 'add') add.push(entry); else remove.push(entry);
        }
      }
      return { commander, add, remove };
    }

    // ── Rendu d'une liste de cartes ───────────────────────────────────────────
    async function renderCards(entries, container) {
      const tasks = entries.map(entry => {
        const { el, img, priceEl } = buildCardEl(entry);
        container.appendChild(el);

        return fetchCardFace(entry.cardName).then(data => {
          if (data?.imageUrl) img.src = data.imageUrl;
          else img.src = 'https://placehold.co/200x286/0f172a/475569?text=N%2FA';
          if (data?.eurPrice) priceEl.textContent = `Prix EUR: €${data.eurPrice}`;
        });
      });
      await Promise.all(tasks);
    }

    // ── Construction d'un élément carte ──────────────────────────────────────
    function buildCardEl(entry) {
      const el = document.createElement('div');
      el.className = 'item';

      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      const img = document.createElement('img');
      img.alt     = entry.cardName;
      img.loading = 'lazy';
      img.src     = 'https://placehold.co/200x286/0f172a/475569?text=...';
      thumb.appendChild(img);

      const title = document.createElement('div');
      title.className = 'item-title';
      title.textContent = entry.cardName;

      const priceEl = document.createElement('div');
      priceEl.className = 'item-price';
      priceEl.textContent = 'Prix EUR: chargement…';

      const link = document.createElement('a');
      link.className = 'item-link';
      link.href   = entry.marketLink;
      link.target = '_blank';
      link.rel    = 'noopener noreferrer';
      link.textContent = entry.marketLabel;

      el.appendChild(thumb);
      el.appendChild(title);
      el.appendChild(priceEl);
      el.appendChild(link);

      return { el, img, priceEl };
    }

    // ── API Scryfall ──────────────────────────────────────────────────────────
    async function fetchCardFace(name) {
      try {
        const r = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}`);
        if (!r.ok) return null;
        const d = await r.json();
        return {
          imageUrl: d.image_uris?.normal || d.card_faces?.[0]?.image_uris?.normal || null,
          eurPrice: d.prices?.eur || null,
        };
      } catch { return null; }
    }

    async function fetchCommanderArt(name) {
      try {
        const r = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}`);
        if (!r.ok) return null;
        const d = await r.json();
        return d.image_uris?.art_crop || d.card_faces?.[0]?.image_uris?.art_crop || null;
      } catch { return null; }
    }

    // ── Affichage d'une erreur ────────────────────────────────────────────────
    function showError(msg) {
      loadingZone.innerHTML = `<div class="error-state">${msg}</div>`;
    }
  </script>
</body>
</html>
